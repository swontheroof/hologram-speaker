<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        window.addEventListener('error', function(event) {
            fetch('/api/log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: event.message,
                    source: event.filename,
                    lineno: event.lineno,
                    colno: event.colno,
                    error: event.error ? event.error.stack : null
                })
            });
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Holographic Music Speaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Three.js and Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- MediaPipe Hands for Local Webcam Simulation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="main-layout" id="main-layout">
        
        <!-- Right: 3D Hologram Area (Main Viewer) -->
        <main class="hologram-viewport-area" style="width: 100vw; height: 100vh;">
            <!-- WebGL Canvas for Three.js -->
            <canvas id="hologram-canvas"></canvas>
        </main>
        
    </div>

    <!-- Hidden Audio element -->
    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script src="{{ url_for('static', filename='js/hologram.js') }}?v=102"></script>
</body>
</html>
