<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram Speaker Remote Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-black: hsl(220, 30%, 4%);
            --bg-dark-gray: hsl(220, 20%, 9%);
            --bg-glass: rgba(18, 22, 33, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: hsl(210, 40%, 98%);
            --text-secondary: hsl(215, 20%, 70%);
            --accent-purple: #9d00ff;
            --accent-blue: #00d9ff;
            --accent-red: hsl(340, 85%, 55%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .remote-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 1rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(90deg, #fff, var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            background: rgba(0, 217, 255, 0.15);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .track-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .album-cover-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--border-glass);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: spin 16s linear infinite;
            animation-play-state: paused;
            transition: transform 0.3s ease;
        }

        .album-cover-wrapper.playing {
            animation-play-state: running;
        }

        .album-cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .track-info h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .track-info p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .media-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.75rem;
            margin-top: 0.5rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
        }

        .btn-circle:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-play {
            width: 60px;
            height: 60px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent-red), #ff7b00);
            border: none;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        .btn-play:active {
            transform: scale(0.92);
            box-shadow: 0 2px 8px rgba(255, 0, 85, 0.2);
        }

        .seek-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .seek-bar {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-blue);
        }

        .time-readout {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .panel-section {
            display: flex;
            flex-direction: column;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-row label {
            color: var(--text-primary);
        }

        .setting-row input[type="range"] {
            width: 130px;
            outline: none;
        }

        .setting-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .btn-gemini-call {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: transform 0.15s ease, opacity 0.2s;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.75rem;
        }

        .btn-gemini-call:active {
            transform: scale(0.97);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex-grow: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-glass);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .btn-send {
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-send:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .monitor-panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-blue);
            min-height: 40px;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="remote-container">
        <header>
            <span class="logo">🍓 Speaker Remote</span>
            <div class="status-badge" id="conn-status">Disconnected</div>
        </header>

        <!-- Current Playing Track Info Card -->
        <main class="track-card">
            <div class="album-cover-wrapper" id="album-cover-wrap">
                <img id="track-cover" src="/static/assets/album_art.jpg" alt="Album Cover">
            </div>

            <div class="track-info">
                <h2 id="track-title">Loading track...</h2>
                <p id="track-artist">Loading artist...</p>
            </div>

            <!-- Media player controls -->
            <section class="media-controls">
                <button class="btn btn-circle" id="btn-prev">⏮️</button>
                <button class="btn btn-circle btn-play" id="btn-play">▶️</button>
                <button class="btn btn-circle" id="btn-next">⏭️</button>
            </section>

            <!-- Custom Progress Bar / Seek slider -->
            <div class="seek-container">
                <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0">
                <div class="time-readout">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </main>

        <!-- Gemini voice/text assistant controls -->
        <section class="panel-section">
            <h3 class="section-title">✨ 제미나이 무선 비서</h3>
            <button class="btn-gemini-call" id="btn-gemini-call">✨ 제미나이 호출하기 (Voice Mode)</button>
            <div class="chat-input-wrapper">
                <input type="text" class="chat-input" id="chat-input" placeholder="명령어를 입력하세요 (예: 음악 재생, 다음곡)...">
                <button class="btn-send" id="btn-send">전송</button>
            </div>
        </section>

        <!-- Settings Calibration Sliders -->
        <section class="panel-section">
            <h3 class="section-title">⚙️ 원격 센서 캘리브레이션</h3>

            <div class="setting-row">
                <label for="slider-friction">회전 마찰력 (Inertia)</label>
                <input type="range" id="slider-friction" min="0.9" max="0.999" step="0.001" value="0.98">
            </div>

            <div class="setting-row">
                <label for="slider-sensitivity">회전 감도 (Sensitivity)</label>
                <input type="range" id="slider-sensitivity" min="10" max="150" step="1" value="42">
            </div>

            <div class="setting-row">
                <label for="toggle-guides">중앙 가이드 라인 (Center Guides)</label>
                <input type="checkbox" id="toggle-guides" checked>
            </div>

            <div class="setting-row">
                <label for="toggle-webcam">본체 웹캠 인식 켜기 (Local Cam)</label>
                <input type="checkbox" id="toggle-webcam">
            </div>

            <div class="setting-row"
                style="margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center;">
                <label style="font-weight: 600;">📐 홀로그램 화면 모드</label>
                <button type="button" id="btn-toggle-view-mode"
                    style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(99,102,241,0.3);">
                    📐 4면 피라미드 모드
                </button>
            </div>

            <!-- Single View Mode Fine-tuning Sliders -->
            <div id="single-mode-controls"
                style="display: none; margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);">
                <div class="setting-row">
                    <label for="slider-single-scale">🔍 1면 홀로그램 크기 (10% ~ 130%)</label>
                    <input type="range" id="slider-single-scale" min="0.10" max="1.30" step="0.01" value="0.48">
                </div>
                <div class="setting-row" style="margin-top: 8px;">
                    <label for="slider-single-offset-x">↔️ 1면 좌우 위치 (East Side)</label>
                    <input type="range" id="slider-single-offset-x" min="-0.60" max="0.60" step="0.01" value="0.30">
                </div>
            </div>
        </section>

        <!-- Dynamic Monitor Console -->
        <section class="panel-section">
            <h3 class="section-title">📊 실시간 제스처 모니터</h3>
            <div class="monitor-panel" id="monitor-console">
                연결 대기 중...
            </div>
        </section>

        <!-- Live Camera Monitor Section -->
        <section class="panel-section">
            <h3 class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span>📷 실시간 카메라 라이브 스트림</span>
                <button type="button" id="btn-toggle-camera-stream"
                    style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-glass); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;">미리보기
                    열기</button>
            </h3>
            <div id="camera-stream-container"
                style="display: none; margin-top: 10px; text-align: center; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-glass);">
                <img id="camera-stream-img" src="" alt="카메라 스트림 중단됨"
                    style="width: 100%; height: auto; display: block; min-height: 180px; background: #111; color: #888; object-fit: contain;">
                <p style="padding: 6px; font-size: 0.75rem; color: var(--text-secondary);">전체화면 URL: <a
                        href="/video_feed" target="_blank" style="color: var(--accent-blue);">/video_feed</a></p>
            </div>
        </section>
    </div>

    <script>
        const socket = io();

        // Element caching
        const connStatus = document.getElementById('conn-status');
        const trackCover = document.getElementById('track-cover');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const albumCoverWrap = document.getElementById('album-cover-wrap');
        const btnPlay = document.getElementById('btn-play');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const seekBar = document.getElementById('seek-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const btnGeminiCall = document.getElementById('btn-gemini-call');
        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');
        const sliderFriction = document.getElementById('slider-friction');
        const sliderSensitivity = document.getElementById('slider-sensitivity');
        const toggleGuides = document.getElementById('toggle-guides');
        const toggleWebcam = document.getElementById('toggle-webcam');
        const monitorConsole = document.getElementById('monitor-console');

        let isUserSeeking = false;
        let songDuration = 0;

        // Socket connection handlers
        socket.on('connect', () => {
            connStatus.textContent = 'Connected';
            connStatus.style.background = 'rgba(0, 217, 255, 0.15)';
            connStatus.style.color = 'var(--accent-blue)';
            connStatus.style.borderColor = 'rgba(0, 217, 255, 0.2)';
            monitorConsole.textContent = '스피커 서버 연결 성공. 동기화 대기 중...';
        });

        socket.on('disconnect', () => {
            connStatus.textContent = 'Disconnected';
            connStatus.style.background = 'rgba(255, 0, 85, 0.15)';
            connStatus.style.color = 'var(--accent-red)';
            connStatus.style.borderColor = 'rgba(255, 0, 85, 0.2)';
            monitorConsole.textContent = '서버와의 연결이 끊어졌습니다.';
        });

        let remoteCurrentTime = 0;
        let isRemotePlaying = false;

        // Smooth local playback progression timer for remote control UI
        setInterval(() => {
            if (isRemotePlaying && !isUserSeeking && songDuration > 0) {
                remoteCurrentTime = Math.min(songDuration, remoteCurrentTime + 1);
                const percentage = (remoteCurrentTime / songDuration) * 100;
                seekBar.value = percentage;
                currentTimeEl.textContent = formatTime(remoteCurrentTime);
            }
        }, 1000);

        // 1. Listen for player state sync from the main hologram speaker screen
        socket.on('player_state_update', (state) => {
            console.log("Player state sync received:", state);

            // Helper to get URL pathname for strict image comparison
            function getCleanPath(urlStr) {
                if (!urlStr) return '';
                try {
                    return new URL(urlStr, window.location.href).pathname;
                } catch (e) {
                    return urlStr;
                }
            }

            // Sync track info
            if (state.trackTitle && trackTitle.textContent !== state.trackTitle) {
                trackTitle.textContent = state.trackTitle;
                remoteCurrentTime = state.currentTime || 0;
            }
            if (state.trackArtist) trackArtist.textContent = state.trackArtist;
            if (state.trackCover && getCleanPath(trackCover.src) !== getCleanPath(state.trackCover)) {
                trackCover.src = state.trackCover;
            }
            songDuration = state.duration || 0;

            if (state.currentTime !== undefined && (state.currentTime > 0 || !state.isPlaying)) {
                remoteCurrentTime = state.currentTime;
            }
            if (state.hologramViewMode) {
                updateViewModeUI(state.hologramViewMode);
            }
            isRemotePlaying = !!state.isPlaying;

            // Sync play state
            if (state.isPlaying) {
                btnPlay.textContent = '⏸️';
                albumCoverWrap.classList.add('playing');
            } else {
                btnPlay.textContent = '▶️';
                albumCoverWrap.classList.remove('playing');
            }

            // Sync seek bar (only if user is not actively dragging the remote slider)
            if (!isUserSeeking && songDuration > 0) {
                const percentage = (remoteCurrentTime / songDuration) * 100;
                seekBar.value = percentage;
                currentTimeEl.textContent = formatTime(remoteCurrentTime);
                durationEl.textContent = formatTime(songDuration);
            }

            // Sync console display
            let consoleMsg = `[${state.currentMode}:${state.subState}] `;
            if (state.currentMode === 'GEMINI') {
                if (state.subState === 'LISTENING') consoleMsg += '제미나이가 음성을 듣고 있습니다... 🎙️';
                else if (state.subState === 'THINKING') consoleMsg += '제미나이 생각 중... ☄️';
                else if (state.subState === 'SPEAKING') consoleMsg += state.gestureStatus || '제미나이 답변 중... 🔊';
            } else {
                consoleMsg += state.gestureStatus || '스피커 대기 중';
            }
            monitorConsole.textContent = consoleMsg;
        });

        // Helper: Format seconds to M:SS
        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // 2. Remote media player action triggers
        btnPlay.addEventListener('click', () => {
            socket.emit('hardware_gesture', { type: 'play_pause' });
        });

        btnPrev.addEventListener('click', () => {
            socket.emit('hardware_gesture', { type: 'prev' });
        });

        btnNext.addEventListener('click', () => {
            socket.emit('hardware_gesture', { type: 'next' });
        });

        // Remote Seek handling
        seekBar.addEventListener('mousedown', () => { isUserSeeking = true; });
        seekBar.addEventListener('touchstart', () => { isUserSeeking = true; });

        seekBar.addEventListener('input', (e) => {
            if (songDuration > 0) {
                const targetTime = (e.target.value / 100) * songDuration;
                currentTimeEl.textContent = formatTime(targetTime);
            }
        });

        seekBar.addEventListener('change', (e) => {
            isUserSeeking = false;
            const progressRatio = e.target.value / 100;
            socket.emit('hardware_gesture', { type: 'seek', value: progressRatio });
        });

        seekBar.addEventListener('touchend', (e) => {
            isUserSeeking = false;
            const progressRatio = e.target.value / 100;
            socket.emit('hardware_gesture', { type: 'seek', value: progressRatio });
        });

        // 3. Remote Gemini actions
        btnGeminiCall.addEventListener('click', () => {
            socket.emit('gemini_button');
        });

        function sendChat() {
            const text = chatInput.value.trim();
            if (text) {
                socket.emit('remote_chat', { prompt: text });
                chatInput.value = '';
                monitorConsole.textContent = `[원격 명령 전송] "${text}"`;
            }
        }

        btnSend.addEventListener('click', sendChat);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        // 4. Remote Setting modifications
        function emitSettings() {
            socket.emit('remote_setting_change', {
                friction: parseFloat(sliderFriction.value),
                sensitivity: parseFloat(sliderSensitivity.value),
                showGuides: toggleGuides.checked,
                webcamEnabled: toggleWebcam.checked
            });
        }

        sliderFriction.addEventListener('change', emitSettings);
        sliderSensitivity.addEventListener('change', emitSettings);
        toggleGuides.addEventListener('change', emitSettings);
        toggleWebcam.addEventListener('change', emitSettings);

        // 5. Hologram View Mode Toggle (QUAD vs SINGLE_EAST)
        let currentHologramViewMode = 'QUAD';
        const btnToggleViewMode = document.getElementById('btn-toggle-view-mode');
        const singleModeControls = document.getElementById('single-mode-controls');
        const sliderSingleScale = document.getElementById('slider-single-scale');
        const sliderSingleOffsetX = document.getElementById('slider-single-offset-x');

        function updateViewModeUI(mode) {
            currentHologramViewMode = mode;
            if (mode === 'SINGLE_EAST') {
                btnToggleViewMode.textContent = '🖥️ 1면 단일 대형 모드 (East)';
                btnToggleViewMode.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                singleModeControls.style.display = 'block';
            } else {
                btnToggleViewMode.textContent = '📐 4면 피라미드 모드 (Quad)';
                btnToggleViewMode.style.background = 'linear-gradient(135deg, #6366f1, #8b5cf6)';
                singleModeControls.style.display = 'none';
            }
        }

        btnToggleViewMode.addEventListener('click', () => {
            const nextMode = (currentHologramViewMode === 'QUAD') ? 'SINGLE_EAST' : 'QUAD';
            updateViewModeUI(nextMode);
            socket.emit('remote_setting_change', { viewMode: nextMode });
        });

        function emitSingleModeParams() {
            socket.emit('remote_setting_change', {
                singleScale: parseFloat(sliderSingleScale.value),
                singleOffsetX: parseFloat(sliderSingleOffsetX.value)
            });
        }

        sliderSingleScale.addEventListener('input', emitSingleModeParams);
        sliderSingleOffsetX.addEventListener('input', emitSingleModeParams);

        // 6. Live Camera Stream preview toggle
        const btnToggleCamStream = document.getElementById('btn-toggle-camera-stream');
        const camStreamContainer = document.getElementById('camera-stream-container');
        const camStreamImg = document.getElementById('camera-stream-img');

        btnToggleCamStream.addEventListener('click', () => {
            if (camStreamContainer.style.display === 'none') {
                camStreamContainer.style.display = 'block';
                camStreamImg.src = '/video_feed';
                btnToggleCamStream.textContent = '닫기';
            } else {
                camStreamContainer.style.display = 'none';
                camStreamImg.src = '';
                btnToggleCamStream.textContent = '미리보기 열기';
            }
        });
    </script>
</body>
